      <script>
(function() {
    // Funzione per impostare il cookie
    function setCookie(name, value, days) {
        var expires = "";
        if (days) {
            var date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + value + expires + "; path=/; SameSite=Lax";
    }
    
    // Funzione per leggere il cookie
    function getCookie(name) {
        var nameEQ = name + "=";
        var ca = document.cookie.split(';');
        for(var i = 0; i < ca.length; i++) {
            var c = ca[i];
            while (c.charAt(0) == ' ') c = c.substring(1, c.length);
            if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length, c.length);
        }
        return null;
    }
    
    // Funzione per cambiare lingua
    window.setLanguage = function(lang) {
        setCookie('idp_lang', lang, 365);
        
        // Preserva tutti i parametri della query string
        var url = new URL(window.location.href);
        url.searchParams.set('lang', lang);
        window.location.href = url.toString();
    };
    
    // Evidenzia la lingua attiva
    var currentLang = getCookie('idp_lang') || 'it';
    var urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('lang')) {
        currentLang = urlParams.get('lang');
        setCookie('idp_lang', currentLang, 365);
    }
    
    var activeLink = document.getElementById('lang-' + currentLang);
    if (activeLink) {
        activeLink.style.fontWeight = 'bold';
        activeLink.style.color = '#000';

    }
})();
</script>
